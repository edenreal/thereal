name: 매물카드 백필 (수동)

# 자동 실행 없음. Actions 탭에서 'Run workflow' 버튼으로만 돈다.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: '이번에 처리할 건수 (0=전량, 처음엔 100 권장)'
        required: true
        default: '100'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth requests openai
      - name: 백필 실행
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BACKFILL_LIMIT: ${{ github.event.inputs.limit }}
        run: python naver_lodging_backfill.py

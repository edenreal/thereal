# .github/workflows/lodging-monitor.yml
name: 숙박 매물 감시
on:
  schedule:
    - cron: '0 22 * * *'    # UTC 22:00 = 한국 오전 7시 (밤사이 올라온 글)
    - cron: '0 10 * * *'    # UTC 10:00 = 한국 오후 7시 (낮에 올라온 글)
  workflow_dispatch:          # 수동 실행 버튼
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth requests feedparser openai
      - name: Run monitor
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python naver_lodging_monitor.py

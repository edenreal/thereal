# .github/workflows/lodging-monitor.yml
name: 숙박 매물 감시
on:
  schedule:
    - cron: '0 22 * * *'    # UTC 22:00 = 한국시간 오전 7시 (아침에 카드 확인)
  workflow_dispatch:          # 수동 실행 버튼
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth requests feedparser
      - name: Run monitor
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: python naver_lodging_monitor.py
